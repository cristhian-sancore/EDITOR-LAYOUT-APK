<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de APK - Editor de Layout</title>
  <link rel="stylesheet" href="/css/editor.css">
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .upload-container {
      background: #1e293b;
      padding: 3rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid #334155;
      width: 100%;
      max-width: 500px;
    }
    .drop-area {
      border: 2px dashed #475569;
      border-radius: 8px;
      padding: 3rem 1rem;
      margin: 2rem 0;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .drop-area:hover, .drop-area.dragover {
      background: #334155;
      border-color: #38bdf8;
    }
    .drop-area p { margin: 0; font-size: 1.2rem; color: #cbd5e1; }
    #fileInput { display: none; }
    
    #loadingOverlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15,23,42,0.9); z-index: 9999;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        color: white; font-size: 20px;
    }
    .spinner {
        border: 6px solid #334155; border-top: 6px solid #38bdf8;
        border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .progress-container {
        width: 80%;
        max-width: 400px;
        background-color: #334155;
        border-radius: 8px;
        margin-top: 20px;
        overflow: hidden;
    }
    
    .progress-bar {
        width: 0%;
        height: 8px;
        background-color: #38bdf8;
        transition: width 0.3s ease;
    }
    
    #loadingText {
        margin-top: 15px;
        font-size: 16px;
        color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div id="loadingOverlay">
      <div class="spinner"></div>
      <div>Descompilando APK (Isto pode levar de 1 a 2 minutos)...</div>
      <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="loadingText">Enviando arquivo...</div>
  </div>

  <div class="upload-container">
    <h1 style="color: #38bdf8; margin-top: 0;">Editor de APK</h1>
    <p>Faça o upload do seu `.apk` para editar o layout de impressão da Zebra (CPCL).</p>
    
    <div class="drop-area" id="dropArea">
      <p>Arraste e solte o arquivo .apk aqui</p>
      <p style="font-size: 0.9rem; color: #64748b; margin-top: 10px;">ou clique para selecionar</p>
      <input type="file" id="fileInput" accept=".apk">
    </div>
  </div>

  <script>
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const overlay = document.getElementById('loadingOverlay');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false)
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false)
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false)
    });

    dropArea.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length) handleFile(files[0]);
    });

    dropArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
      if (this.files.length) handleFile(this.files[0]);
    });

    async function handleFile(file) {
      if (!file.name.endsWith('.apk')) {
        alert("Por favor, selecione um arquivo .apk");
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      overlay.style.display = 'flex';
      const progressBar = document.getElementById('progressBar');
      const loadingText = document.getElementById('loadingText');
      
      let progress = 0;
      progressBar.style.width = '0%';
      loadingText.textContent = 'Enviando arquivo para o servidor...';

      // Simula o progresso da extração (já que não temos websocket)
      const interval = setInterval(() => {
          if (progress < 40) {
              progress += 2; // Rápido no início (upload)
          } else if (progress < 85) {
              progress += 0.5; // Lento durante a extração (baksmali)
              loadingText.textContent = 'Extraindo código fonte (baksmali)...';
          } else if (progress < 95) {
              progress += 0.1; // Muito lento no final
              loadingText.textContent = 'Buscando layouts CPCL nas classes...';
          }
          progressBar.style.width = progress + '%';
      }, 500);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        clearInterval(interval);
        progressBar.style.width = '100%';
        loadingText.textContent = 'Finalizado!';

        const data = await response.json();
        
        // Dá um tempinho pra ver a barra em 100%
        setTimeout(() => {
            overlay.style.display = 'none';
            if (response.ok) {
              localStorage.setItem('apk_session_id', data.session_id);
              window.location.href = '/layouts.html';
            } else {
              alert('Erro: ' + (data.error || 'Falha ao processar APK.'));
            }
        }, 500);
        
      } catch (error) {
        clearInterval(interval);
        overlay.style.display = 'none';
        alert('Erro de conexão com o servidor backend.');
      }
    }
  </script>
</body>
</html>
