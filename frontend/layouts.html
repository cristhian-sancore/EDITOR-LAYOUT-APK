<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selecionar Layout - Editor de APK</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 { color: #38bdf8; margin-top: 0; }
    .layout-list {
      list-style: none;
      padding: 0;
      max-height: 60vh;
      overflow-y: auto;
    }
    .layout-item {
      background: #334155;
      margin-bottom: 8px;
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layout-item:hover {
      background: #475569;
    }
    .layout-name {
      font-weight: bold;
      color: #e2e8f0;
    }
    .layout-path {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    #loading {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Selecione o Layout para Editar</h1>
    <p>Foram encontrados vários layouts embutidos no código-fonte do aplicativo. Selecione o que deseja editar.</p>
    
    <input type="text" id="searchInput" placeholder="Pesquisar cidade ou modelo (ex: Ibate, ZQ520)...">
    
    <div id="loading">Carregando layouts...</div>
    <ul class="layout-list" id="layoutList"></ul>
  </div>

  <script>
    const sessionId = localStorage.getItem('apk_session_id');
    if (!sessionId) {
      window.location.href = '/index.html';
    }

    const layoutList = document.getElementById('layoutList');
    const loading = document.getElementById('loading');
    const searchInput = document.getElementById('searchInput');
    let allLayouts = [];

    async function loadLayouts() {
      try {
        const res = await fetch(`/api/list_layouts/${sessionId}`);
        const data = await res.json();
        
        if (data.layouts) {
          allLayouts = data.layouts;
          renderLayouts(allLayouts);
        }
      } catch (err) {
        alert("Erro ao buscar layouts");
      } finally {
        loading.style.display = 'none';
      }
    }

    function renderLayouts(layouts) {
      layoutList.innerHTML = '';
      layouts.forEach(path => {
        // Ex: smali_classes11/br/com/.../CpclIbateZQ521.smali
        const parts = path.split('/');
        const filename = parts[parts.length - 1]; // CpclIbateZQ521.smali
        
        const li = document.createElement('li');
        li.className = 'layout-item';
        li.innerHTML = `
          <div class="layout-name">${filename.replace('.smali', '')}</div>
          <div class="layout-path">${path}</div>
        `;
        
        li.onclick = () => {
          localStorage.setItem('apk_layout_file', path);
          window.location.href = '/editor.html';
        };
        
        layoutList.appendChild(li);
      });
      
      if (layouts.length === 0) {
        layoutList.innerHTML = '<li style="text-align:center; padding: 2rem; color: #94a3b8;">Nenhum layout encontrado.</li>';
      }
    }

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allLayouts.filter(path => path.toLowerCase().includes(term));
      renderLayouts(filtered);
    });

    loadLayouts();
  </script>
</body>
</html>
